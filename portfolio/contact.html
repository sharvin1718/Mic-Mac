<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>

<body>
    <div class="bg-sky-700 min-h-screen px-4 sm:px-8">
        <div class="m-5">
            <a href="index.html"> 
                <button
                    class="  ml-0 sm:ml-10 mt-6 border rounded-lg p-2 bg-white hover:bg-amber-400 hover:scale-110 transition-all duration-300"><i class="
                    bi bi-box-arrow-left"></i> Go Back </button></a>
        </div>
        <div class=" mt-10">
            <h1 class="text-3xl font-bold text-white">Contact Me</h1>
        </div>
        <hr class="mt-5 text-white">
        <div class="flex justify-center">
            <div class=" flex mt-10 w-1/2 ">
                <form action="submit.html" class="flex flex-col w-full max-w-2xl px-2">

                    <label class="text-white text-xl" for="name"> Name :</label>
                    <input class="border border-none mt-3  bg-white rounded-lg w-full p-2 hover:border-none" type="text"
                        placeholder="Enter Your Name" name="name" id="name" value="" required>

                    <label class="text-white text-xl mt-5" for="email">Email :</label>
                    <input class="border border-none mt-3  bg-white rounded-lg w-full  p-2 hover:border-none"
                        type="email" placeholder="Enter Your Email" name="email" id="email" value="" required>

                    <label class="text-white mt-5 text-xl">Your Messag :</label>
                    <textarea class="w-full mt-3 h-30 bg-white border rounded-lg p-3 outline-none resize-none"
                        placeholder="Enter your message here" value="" required></textarea>

                    <button
                        class="w-full sm:w-32 border p-2 rounded-lg hover:bg-red-500 transition-all duration-300 cursor-pointer mt-4 text-white">Submit</button>

                </form>

            </div>

        </div>

        <div class="flex justify-center items-center gap-6 sm:gap-10 mt-8 pb-8">
            <a class="text-3xl sm:text-4xl text-white hover:text-red-500"
                href="https://mail.google.com/mail/u/0/#inbox "><i class="bi bi-envelope"></i></a>
            <a class="text-3xl sm:text-4xl text-white hover:text-red-500" href="https://wa.me/7010689654"><i
                    class="bi bi-phone"></i></a>
            <a class="text-3xl sm:text-4xl text-white  hover:text-red-500" href="https://in.linkedin.com/"><i
                    class="bi bi-linkedin"></i></a>
        </div>
    </div>


</body>

</html>
